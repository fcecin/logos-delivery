name: ci / nix
permissions:
  contents: read
  pull-requests: read
  checks: write
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
    tags: ['v*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        system:
          - aarch64-darwin
          - x86_64-linux
        nixpkg:
          - liblogosdelivery
          - rln

        include:
          - system: aarch64-darwin
            runs_on: [self-hosted, macOS, ARM64]

          - system: x86_64-linux
            runs_on: [self-hosted, Linux, X64]

    name: '${{ matrix.system }} / ${{ matrix.nixpkg }}'
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Cachix (read-only)
        if: github.event_name == 'pull_request'
        uses: cachix/cachix-action@v15
        with:
          name: logos-co
          skipPush: true

      - name: Setup Cachix (push)
        if: github.event_name == 'push'
        uses: cachix/cachix-action@v15
        with:
          name: logos-co
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: 'Run Nix build for ${{ matrix.nixpkg }}'
        shell: bash
        run: nix build -L '.#${{ matrix.nixpkg }}'

      - name: 'Show result contents'
        shell: bash
        run: find result -type f
